name: "Check for new election donations to syndicate to Bluesky"
on:
  schedule:
    - cron: "0 19-23,0-6 * * *" # 7am - 6pm NZST / 8am - 7pm NZDT and probably no one is posting at night
  workflow_dispatch:
env:
  PYTHONUNBUFFERED: 1 # ensure that python scripts live output instead of buffering

jobs:
  sync:
    name: Election Donation Syndication
    timeout-minutes: 5
    runs-on: ubuntu-latest

    services:
      browserless:
        image: ghcr.io/browserless/chromium:latest
        ports:
          - 3000:3000
        env:
          TOKEN: ${{ secrets.BROWSERLESS_API_TOKEN }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Wait for Browserless
        run: |
          for i in {1..30}; do
            if curl -sf "http://localhost:3000/active?token=${{ secrets.BROWSERLESS_API_TOKEN }}" > /dev/null; then
              echo "Browserless ready after ${i} attempt(s)"
              exit 0
            fi
            sleep 2
          done
          echo "Browserless did not become ready in time"
          exit 1
      - name: Syndicate Beehive publications to Bluesky
        run: python electiondonations/bot.py
        env:
          BLUESKY_USERNAME: ${{ secrets.ELECTIONDONATIONS_BLUESKY_USERNAME }}
          BLUESKY_PASSWORD: ${{ secrets.ELECTIONDONATIONS_BLUESKY_PASSWORD }}
          BROWSERLESS_API_TOKEN: ${{ secrets.BROWSERLESS_API_TOKEN }}
          BROWSERLESS_URL: http://localhost:3000/content
          POST_TO_BLUESKY: True
      - name: Commit history changes
        # Even if we crash out, we can persist our state so that the next run
        # will catch anything that fell over
        if: always()
        run: |
          set -eux

          git config --local user.email "helper@utf9k.net"
          git config --local user.name "Helper Bot"

          if [ -z "$(git status --porcelain)" ]; then
            # No changes have occurred so there's no point generating a commit"
            exit 0
          fi

          git add .
          git commit -m "New election donations have been syndicated"
          git push
