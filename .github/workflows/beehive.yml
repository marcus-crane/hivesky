name: "Beehive syndication (self-hosted Browserless)"
on:
  workflow_dispatch:
env:
  PYTHONUNBUFFERED: 1

jobs:
  sync:
    name: Syndication
    timeout-minutes: 5
    runs-on: ubuntu-latest

    services:
      browserless:
        image: ghcr.io/browserless/chromium:latest
        ports:
          - 3000:3000
        env:
          TOKEN: ${{ secrets.BROWSERLESS_API_TOKEN }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Wait for Browserless
        run: |
          for i in {1..30}; do
            if curl -sf "http://localhost:3000/active?token=${{ secrets.BROWSERLESS_API_TOKEN }}" > /dev/null; then
              echo "Browserless ready after ${i} attempt(s)"
              exit 0
            fi
            sleep 2
          done
          echo "Browserless did not become ready in time"
          exit 1
      - name: Syndicate Beehive publications to Bluesky
        run: python beehive/bot.py
        env:
          BLUESKY_USERNAME: ${{ secrets.BLUESKY_USERNAME }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          BROWSERLESS_API_TOKEN: ${{ secrets.BROWSERLESS_API_TOKEN }}
          BROWSERLESS_URL: http://localhost:3000/content
          POST_TO_BLUESKY: True
      - name: Commit history changes
        if: always()
        run: |
          set -eux

          git config --local user.email "helper@utf9k.net"
          git config --local user.name "Helper Bot"

          if [ -z "$(git status --porcelain)" ]; then
            exit 0
          fi

          git add .
          git commit -m "New releases have been syndicated"
          git push
