name: "Check for new consultations to syndicate to Bluesky"
on:
  schedule:
    - cron: "0 21,5 * * *" # 9am & 5pm NZST (10am & 6pm during NZDT)
  workflow_dispatch:
env:
  PYTHONUNBUFFERED: 1

jobs:
  sync:
    name: Consultation Syndication
    timeout-minutes: 10
    runs-on: ubuntu-latest

    services:
      browserless:
        image: ghcr.io/browserless/chromium:latest
        ports:
          - 3000:3000
        env:
          TOKEN: ${{ secrets.BROWSERLESS_API_TOKEN }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Wait for Browserless
        run: |
          for i in {1..30}; do
            if curl -sf "http://localhost:3000/active?token=${{ secrets.BROWSERLESS_API_TOKEN }}" > /dev/null; then
              echo "Browserless ready after ${i} attempt(s)"
              exit 0
            fi
            sleep 2
          done
          echo "Browserless did not become ready in time"
          exit 1
      - name: Syndicate consultations to Bluesky
        run: python consultations/bot.py
        env:
          BLUESKY_USERNAME: ${{ secrets.CONSULTATIONS_BLUESKY_USERNAME }}
          BLUESKY_PASSWORD: ${{ secrets.CONSULTATIONS_BLUESKY_PASSWORD }}
          BROWSERLESS_API_TOKEN: ${{ secrets.BROWSERLESS_API_TOKEN }}
          BROWSERLESS_URL: http://localhost:3000/content
          POST_TO_BLUESKY: True
      - name: Commit history changes
        if: always()
        run: |
          set -eux

          git config --local user.email "helper@utf9k.net"
          git config --local user.name "Helper Bot"

          if [ -z "$(git status --porcelain)" ]; then
            exit 0
          fi

          git add .
          git commit -m "New consultations have been syndicated"

          # Other syndication workflows push to main too, so rebase onto any
          # concurrent commits and retry rather than failing on a race.
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash && git push && exit 0
            sleep $((RANDOM % 5 + 1))
          done
          echo "push failed after retries" >&2
          exit 1
