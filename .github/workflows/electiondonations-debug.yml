name: "Election donations debug"
on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    services:
      browserless:
        image: ghcr.io/browserless/chromium:latest
        ports:
          - 3000:3000
        env:
          TOKEN: ${{ secrets.BROWSERLESS_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Wait for Browserless
        run: |
          for i in {1..30}; do
            if curl -sf "http://localhost:3000/active?token=${{ secrets.BROWSERLESS_API_TOKEN }}" > /dev/null; then
              echo "Browserless ready after ${i} attempt(s)"
              exit 0
            fi
            sleep 2
          done
          echo "Browserless did not become ready in time"
          exit 1
      - name: Fetch OG card for opportunity.org.nz via Browserless
        run: |
          python - <<'PY'
          from electiondonations.bot import fetch_og_card

          card = fetch_og_card("https://www.opportunity.org.nz/")
          print(card)
          PY
        env:
          BROWSERLESS_API_TOKEN: ${{ secrets.BROWSERLESS_API_TOKEN }}
          BROWSERLESS_URL: http://localhost:3000/content
